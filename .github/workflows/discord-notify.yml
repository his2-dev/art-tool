name: Discord Notify

on:
  push:
    branches: [main, 'claude/*']
    paths:
      - 'output/news/**.json'
  workflow_dispatch:
    inputs:
      meta_path:
        description: '전송할 메타 JSON 경로 (예: output/news/2026-04-19.json). 비우면 가장 최근 .json 자동 선택.'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: discord-notify-${{ github.ref }}
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests==2.32.3 beautifulsoup4==4.12.3 Pillow==10.4.0

      - name: Collect meta files to send
        id: find
        env:
          MANUAL_META: ${{ inputs.meta_path }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # 수동 실행: 입력값 우선, 비어있으면 가장 최근 JSON 자동 선택
            if [ -n "${MANUAL_META:-}" ]; then
              CHANGED=("$MANUAL_META")
            else
              mapfile -t CHANGED < <(ls -1t output/news/*.json 2>/dev/null | head -1)
            fi
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            if [[ "$BEFORE" =~ ^0+$ ]]; then
              BEFORE="$(git rev-parse HEAD~1 2>/dev/null || echo '')"
            fi
            if [ -z "$BEFORE" ]; then
              echo "files=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            git config core.quotepath false
            mapfile -t CHANGED < <(git diff --name-only --diff-filter=AM "$BEFORE" "$AFTER" -- 'output/news/*.json' | sort -u)
          fi
          {
            echo "files<<EOF"
            printf '%s\n' "${CHANGED[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Discord
        if: steps.find.outputs.files != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "::error::DISCORD_WEBHOOK_URL secret is not set"
            exit 1
          fi
          while IFS= read -r meta; do
            [ -z "$meta" ] && continue
            # _auto.json은 daily_auto.py가 직접 전송하므로 스킵
            if [[ "$meta" == *_auto.json ]]; then
              echo "::notice::skip (auto): $meta"
              continue
            fi
            if [ ! -f "$meta" ]; then
              echo "::warning::missing $meta, skip"
              continue
            fi
            echo "::notice::sending $meta"
            python tools/discord_notify_ci.py "$meta"
          done <<< "${{ steps.find.outputs.files }}"
