name: Scheduled Discord Test

on:
  schedule:
    # 21:50 KST = 12:50 UTC (2026-04-22 테스트용)
    - cron: '50 12 22 4 *'
  workflow_dispatch:
    inputs:
      meta_path:
        description: '전송할 메타 JSON 경로 (기본: output/pending/2026-04-22_서서울미술관.json)'
        required: false
        default: 'output/pending/2026-04-22_서서울미술관.json'

permissions:
  contents: read

concurrency:
  group: scheduled-test-${{ github.ref }}
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests==2.32.3 beautifulsoup4==4.12.3 Pillow==10.4.0

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          META_PATH: ${{ inputs.meta_path || 'output/pending/2026-04-22_서서울미술관.json' }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "::error::DISCORD_WEBHOOK_URL secret is not set"
            exit 1
          fi
          if [ ! -f "$META_PATH" ]; then
            echo "::error::meta file not found: $META_PATH"
            exit 1
          fi
          echo "::notice::sending $META_PATH"
          python tools/discord_notify_ci.py "$META_PATH"
