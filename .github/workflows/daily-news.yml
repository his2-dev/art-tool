name: Daily News Auto

on:
  schedule:
    # KST 18:33 (UTC 09:33) — Claude 스케줄 태스크(17:07 KST)의 폴백.
    # 반드시 프라이머리(17:07) '뒤'에 둬야 한다. 앞에 두면 폴백이 먼저 발행하고
    # 프라이머리도 발행해 중복이 난다. 프라이머리가 오늘자 큐레이션을 이미
    # main/claude/* 에 올렸으면 가드가 스킵한다.
    - cron: '33 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-news-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if already published today
        id: guard
        run: |
          TODAY=$(TZ=Asia/Seoul date +%F)
          # 1) main에 오늘자 큐레이션(_auto 아님)이 이미 있으면 스킵.
          if ls output/news/${TODAY}_*.json 2>/dev/null | grep -v _auto > /dev/null; then
            echo "오늘자(${TODAY}) 발행물이 main에 이미 존재 — 폴백 발송 생략"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # 2) 12:00 클로드 스케줄이 임시 브랜치(claude/*)에 오늘자 큐레이션을 올렸으면 스킵.
          #    (스케줄 결과는 claude/* 브랜치로 푸시되고 discord-notify가 이미 전송함 → 중복 방지)
          git fetch --quiet --prune origin '+refs/heads/claude/*:refs/remotes/origin/claude/*' || true
          for b in $(git for-each-ref --format='%(refname)' refs/remotes/origin/claude/ 2>/dev/null); do
            if git ls-tree -r --name-only "$b" -- output/news 2>/dev/null \
                 | grep -E "/${TODAY}_" | grep -v _auto > /dev/null; then
              echo "오늘자(${TODAY}) 큐레이션이 ${b} 에 존재 — 클로드 스케줄이 이미 발행, 폴백 생략"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "오늘자 발행물 없음 — 폴백 진행"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: pip install requests==2.32.3 beautifulsoup4==4.12.3 lxml==5.2.2 Pillow==10.4.0 "curl_cffi>=0.7"

      - name: Run daily auto selector & Discord send
        if: steps.guard.outputs.skip != 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "::error::DISCORD_WEBHOOK_URL secret is not set"
            exit 1
          fi
          python tools/daily_auto.py

      - name: Commit auto JSON (deduplication 기록용)
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # _auto*.json 파일만 커밋 (PNG 제외 — discord-notify 중복 트리거 방지)
          git add output/news/*_auto*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "커밋할 변경 없음"
          else
            # commit을 먼저 해야 pull --rebase가 동작 (staged 상태에서 rebase 불가)
            git commit -m "auto: $(date +%Y-%m-%d\ %H:%M) KST 뉴스 자동 발행 기록"
            git pull --rebase origin main
            git push origin main || (sleep 5 && git pull --rebase origin main && git push origin main)
          fi
