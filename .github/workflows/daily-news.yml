name: Daily News Auto

on:
  schedule:
    # KST 13:00 (UTC 04:00) — Claude 스케줄 태스크(12:00 KST)의 폴백.
    # 당일 발행물이 이미 main에 있으면 스킵한다.
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-news-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if already published today
        id: guard
        run: |
          TODAY=$(TZ=Asia/Seoul date +%F)
          if ls output/news/${TODAY}_*.json 2>/dev/null | grep -v _auto > /dev/null; then
            echo "오늘자(${TODAY}) 발행물이 이미 존재 — 폴백 발송 생략"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: pip install requests==2.32.3 beautifulsoup4==4.12.3 lxml==5.2.2 Pillow==10.4.0 "curl_cffi>=0.7"

      - name: Run daily auto selector & Discord send
        if: steps.guard.outputs.skip != 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "::error::DISCORD_WEBHOOK_URL secret is not set"
            exit 1
          fi
          python tools/daily_auto.py

      - name: Commit auto JSON (deduplication 기록용)
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # _auto*.json 파일만 커밋 (PNG 제외 — discord-notify 중복 트리거 방지)
          git add output/news/*_auto*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "커밋할 변경 없음"
          else
            # commit을 먼저 해야 pull --rebase가 동작 (staged 상태에서 rebase 불가)
            git commit -m "auto: $(date +%Y-%m-%d\ %H:%M) KST 뉴스 자동 발행 기록"
            git pull --rebase origin main
            git push origin main || (sleep 5 && git pull --rebase origin main && git push origin main)
          fi
