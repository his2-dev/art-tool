name: Daily News Auto

on:
  schedule:
    # KST 12:00 / 15:00 / 18:00 (UTC 03:00 / 06:00 / 09:00)
    - cron: '0 3 * * *'
    - cron: '0 6 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-news-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests==2.32.3 beautifulsoup4==4.12.3 lxml==5.2.2 Pillow==10.4.0

      - name: Run daily auto selector & Discord send
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "::error::DISCORD_WEBHOOK_URL secret is not set"
            exit 1
          fi
          python tools/daily_auto.py

      - name: Commit auto JSON (deduplication 기록용)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # _auto.json 파일만 커밋 (PNG 제외 — discord-notify 중복 트리거 방지)
          git add output/news/*_auto.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "커밋할 변경 없음"
          else
            git pull --rebase origin main
            git commit -m "auto: $(date +%Y-%m-%d\ %H:%M) KST 뉴스 자동 발행 기록"
            git push origin main
          fi
